<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bienvenido, {{ session.profesor_usuario }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="shortcut icon" href="/static/logo.ico">

    <style>
        body {
            background: radial-gradient(circle, #0a0f1f, #000);
            color: #00eaff;
            font-family: "Segoe UI", sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 40px;
            text-shadow: 0 0 20px #00eaff;
        }

        p {
            font-size: 20px;
            opacity: 0.8;
        }

        .panel {
            margin: 40px auto;
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 0 20px #00eaff;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #00eaff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #00bcd4;
        }

        .error {
            color: #ff4d4d;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>¡Bienvenido, {{ session.profesor_usuario }}!</h1>
<p>Antes de continuar, por favor configura tu nueva contraseña.</p>

<div class="panel">

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/cambiar_password" method="POST">
        <input type="password" name="nueva" placeholder="Nueva contraseña" required>
        <input type="password" name="confirmar" placeholder="Confirmar contraseña" required>
        <button type="submit">Cambiar contraseña</button>
    </form>
</div>

</body>
</html>
