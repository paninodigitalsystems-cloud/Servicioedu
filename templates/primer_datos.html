<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Completa tus datos</title>

<style>

    /* ============================
       VARIABLES ORIGINALES DEL PANEL
       ============================ */
    :root {
        --bg:        #080e14;
        --bg2:       #0d1820;
        --bg3:       #111d28;
        --surface:   rgba(255,255,255,0.04);
        --surface2:  rgba(255,255,255,0.07);
        --border:    rgba(0,180,210,0.15);
        --border2:   rgba(0,180,210,0.28);
        --accent:    #00b4d8;
        --accent2:   #0077b6;
        --green:     #2dd4a0;
        --red:       #f25c5c;
        --amber:     #f4a942;
        --text:      #d4eaf5;
        --muted:     #5a8099;
        --sidebar-w: 270px;
        --mono:      'JetBrains Mono', monospace;
        --sans:      'Space Grotesk', sans-serif;
    }

    /* ============================
       FONDO HOLOGRÁFICO ANIMADO
       ============================ */
    body {
        font-family: var(--sans);
        background: repeating-linear-gradient(
            135deg,
            #06121c 0px,
            #06121c 4px,
            #071a28 4px,
            #071a28 8px
        );
        animation: bgMove 12s linear infinite;
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    @keyframes bgMove {
        from { background-position: 0 0; }
        to   { background-position: 400px 400px; }
    }

    /* GLOW FUTURISTA */
    .glow-1, .glow-2 {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.12;
        z-index: 0;
    }
    .glow-1 { width: 480px; height: 480px; background: var(--accent); top: -120px; left: -120px; }
    .glow-2 { width: 420px; height: 420px; background: var(--accent2); bottom: -120px; right: -80px; }

    /* ============================
       TARJETA PRINCIPAL
       ============================ */
    .form-card {
        width: 460px;
        background: rgba(10,18,28,0.85);
        border: 1px solid var(--border2);
        border-radius: 18px;
        padding: 34px 36px;
        box-shadow: 0 0 40px rgba(0,180,216,.18);
        backdrop-filter: blur(12px);
        position: relative;
        z-index: 10;
        animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
    }

    .form-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), transparent, var(--accent2));
        opacity: .9;
    }

    @keyframes popIn {
        from { opacity: 0; transform: scale(.85) translateY(20px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    h2 {
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 22px;
        letter-spacing: .03em;
        text-shadow: 0 0 8px rgba(0,180,216,.4);
    }

    /* ============================
       LABELS
       ============================ */
    label {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        display: block;
        text-transform: uppercase;
        letter-spacing: .08em;
        font-family: var(--mono);
    }

    /* ============================
       INPUTS VISIBLES
       ============================ */
    input {
        width: 100%;
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(0,180,216,0.45);
        border-radius: 12px;
        padding: 13px;
        color: var(--text);
        font-size: 15px;
        margin-bottom: 18px;
        outline: none;
        transition: border-color .2s, box-shadow .2s, transform .15s, background .2s;
        box-shadow: inset 0 0 8px rgba(0,180,216,0.25);
    }

    input::placeholder {
        color: rgba(255,255,255,0.45);
    }

    input:focus {
        border-color: var(--accent);
        background: rgba(0,0,0,0.55);
        box-shadow: 0 0 12px rgba(0,180,216,.55), inset 0 0 12px rgba(0,180,216,.35);
        transform: scale(1.02);
    }

    /* ============================
       BOTÓN
       ============================ */
    button {
        width: 100%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        padding: 14px;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform .15s, box-shadow .2s;
        letter-spacing: .03em;
        text-shadow: 0 0 6px rgba(255,255,255,.3);
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0,180,216,.45);
    }

    button:active {
        transform: scale(.97);
    }

</style>
</head>

<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="form-card">
    <h2>Completa tus datos</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/guardar_datos">

        <label>Nombre completo</label>
        <input type="text" name="nombre" placeholder="Ej: Juan Pérez" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Ej: profesor@centro.com" required>

        <label>Centro</label>
        <input type="text" name="centro" placeholder="Ej: IES Mediterráneo" required>

        <button type="submit">Guardar datos</button>
    </form>
</div>

</body>
</html>
